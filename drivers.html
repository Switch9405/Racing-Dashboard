<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Racing League - Drivers Championship</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page-container">
    <nav>
      <a href="index.html">Standings</a>
      <a href="drivers.html" class="active">Drivers Championship</a>
    </nav>

    <h1>Drivers Championship</h1>
    
    <div class="grid-container drivers-grid">
      <!-- Races Calendar -->
      <div>
        <div class="subheader">Season 1</div>
        <div class="section-title">Races Calendar</div>
        <div class="table-container">
          <table id="calendar-table">
            <thead>
              <tr>
                <th>Event</th>
                <th>Date</th>
                <th>Race</th>
                <th>Track</th>
                <th>Layout</th>
                <th>Format</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="7" class="loading">Loading calendar data...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Points & Movement -->
      <div>
        <div class="subheader">Points</div>
        <div class="table-container">
          <table id="points-table">
            <thead>
              <tr>
                <th>Pos</th>
                <th>Driver</th>
                <th>Pts</th>
                <!-- Dynamic race headers will be added here -->
                <th>FL</th>
                <th>PP</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="20" class="loading">Loading driver points...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="drivers.js"></script>
</body>
</html>
